<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Sky Logger — Auto Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      color-scheme: dark;
    }
    body {
      margin: 0;
      padding: 0;
      background: #050710;
      color: #f5f5f5;
    }
    header {
      padding: 24px 20px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: radial-gradient(circle at top, #243b6b 0, #050710 45%);
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      letter-spacing: 0.05em;
    }
    .subtitle {
      margin: 0;
      font-size: 13px;
      opacity: 0.78;
    }
    main {
      padding: 16px 20px 32px;
    }
    section {
      margin-bottom: 20px;
    }
    label {
      font-size: 13px;
      display: block;
      margin-bottom: 4px;
      opacity: 0.9;
    }
    input[type="text"] {
      width: 100%;
      padding: 7px 9px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(5, 7, 16, 0.9);
      color: #f5f5f5;
      font-size: 13px;
    }
    button {
      margin-top: 10px;
      padding: 7px 14px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      background: #75bcff;
      color: #050710;
      font-weight: 600;
    }
    .status-box {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(15, 20, 40, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      min-height: 60px;
    }
    .status-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }
    .status-ok { color: #9be28f; }
    .status-error { color: #ff6b6b; }
    .status-warn { color: #ffd166; }
    .summary-ok, .summary-error {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
    }
    .summary-ok {
      background: rgba(23, 80, 43, 0.9);
      border: 1px solid rgba(155, 226, 143, 0.8);
      padding-bottom: 16px; /* ボタン追加用に少し余白を広げています */
    }
    .summary-error {
      background: rgba(80, 29, 28, 0.9);
      border: 1px solid rgba(255, 107, 107, 0.9);
    }
    footer {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 20px 18px;
      font-size: 11px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <h1>Sky Logger — Auto Verification</h1>
    <p class="subtitle">
      QRコードのURL・Firestore 公開ログ・GitHub ハッシュの3者を照合して、改ざんの有無を検証します。
    </p>
  </div>
</header>

<main>
  <div class="wrap">
    <section>
      <label for="idInput">videoId / logId</label>
      <input id="idInput" type="text" placeholder="例: a25c8000-4a5a-4bbe-82cc-6f6ec65d9d0d" />
      <button id="runBtn">このIDで検証する</button>
    </section>

    <section>
      <div id="summary"></div>
      <div id="status" class="status-box">まだ検証は実行されていません。</div>
    </section>
  </div>
</main>

<footer>
  <div class="wrap">
    このツールは Sky Logger の公開検証ページです。
    Firestore と GitHub の整合性を第三者が確認できます。
  </div>
</footer>

<script>
  const FIREBASE_PROJECT_ID = "sky-logger-appv1";
  const FIRESTORE_API_KEY   = "AIzaSyA9mECKLUUpyaLsVLZJjq7KeZOEVzA";
  const COLLECTION_PATH     = "public_logs";
  const GITHUB_BASE_RAW     =
    "https://raw.githubusercontent.com/kub1221/sky-logger-hashes/main/";

  const statusEl  = document.getElementById("status");
  const summaryEl = document.getElementById("summary");
  const idInput   = document.getElementById("idInput");

  function appendStatus(icon, text, cls) {
    const line = document.createElement("div");
    line.className = "status-line " + (cls || "");
    line.innerHTML = `<span>${icon}</span><span>${text}</span>`;
    statusEl.appendChild(line);
  }

  function resetStatus() {
    statusEl.innerHTML = "";
  }

  function setSummary(type, text) {
    summaryEl.innerHTML = "";
    const div = document.createElement("div");
    div.className = type === "ok" ? "summary-ok" : "summary-error";
    div.textContent = text;
    summaryEl.appendChild(div);
  }

  function getUrlParams() {
    const p = new URLSearchParams(window.location.search);
    return {
      videoId:  p.get("videoId")?.trim() || "",
      logId:    p.get("logId")?.trim() || "",
      hash:     p.get("hash")?.trim() || ""
    };
  }

  async function fetchFirestore(id) {
    const url =
      `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/${COLLECTION_PATH}/${id}?key=${FIRESTORE_API_KEY}`;
    const res = await fetch(url);
    if (res.status === 404) throw new Error("Firestore: ログが見つかりません (404)");
    if (!res.ok) throw new Error("Firestore 取得エラー: " + res.status);
    return await res.json();
  }

  function extract(doc) {
    const f = doc.fields;
    const v = (x) => x?.stringValue ?? x?.timestampValue ?? x?.integerValue ??
                     x?.doubleValue ?? x?.booleanValue ?? null;
    return {
      id:           v(f.id),
      videoId:      v(f.videoId),
      hash:         v(f.hash),
      githubPath:   v(f.githubPath),
      // ✅ ペア情報の抽出を追加
      pairGroupId:  v(f.pairGroupId),
      role:         v(f.role)
    };
  }

  async function fetchGithubHash(path) {
    const url = GITHUB_BASE_RAW + path;
    const res = await fetch(url);
    if (!res.ok) throw new Error("GitHub 取得エラー: " + res.status);
    return (await res.text()).trim();
  }

  async function runVerification() {
    resetStatus();
    summaryEl.innerHTML = "";

    const params = getUrlParams();
    const id = idInput.value.trim() || params.videoId || params.logId;

    if (!id) {
      alert("videoId / logId が指定されていません。");
      return;
    }
    idInput.value = id;

    appendStatus("⏳", "Firestore を取得中…");

    try {
      const doc = await fetchFirestore(id);
      const log = extract(doc);

      appendStatus("📄", `Firestore 取得成功（id=${log.id}）`, "status-ok");

      // ✅ ペア情報の表示を追加
      if (log.pairGroupId && log.role) {
        appendStatus("🔗", `ペア撮影モードで記録されたログです（Role: ${log.role.toUpperCase()}）`);
        appendStatus("🔗", `Pair ID: ${log.pairGroupId}`, "status-warn");
      }

      // URL の ID 一致
      if (params.videoId || params.logId) {
        const urlId = params.videoId || params.logId;
        const idOk = (urlId === log.id) && (urlId === log.videoId);
        appendStatus(idOk ? "✅" : "❌",
          idOk ? "URL の ID と Firestore の id が一致しました。" :
                 "URL の ID と Firestore の id が一致しません。",
          idOk ? "status-ok" : "status-error"
        );
      }

      // URL の hash と一致？
      if (params.hash) {
        const hOk = (params.hash === log.hash);
        appendStatus(hOk ? "✅" : "❌",
          hOk ? "URL の hash と Firestore の hash が一致しました。" :
                "URL の hash と Firestore の hash が一致しません。",
          hOk ? "status-ok" : "status-error"
        );
      }

      appendStatus("⏳", "GitHub ハッシュ取得中…");

      const gh = await fetchGithubHash(log.githubPath);
      const fsVsGh = (log.hash === gh);

      appendStatus(
        fsVsGh ? "🔑" : "❌",
        fsVsGh ? "Firestore と GitHub のハッシュが完全一致しました。" :
                 "Firestore と GitHub のハッシュが一致しません。",
        fsVsGh ? "status-ok" : "status-error"
      );

      if (fsVsGh) {
        setSummary("ok", "このログは改ざんされていません（完全一致）。");
        
        // --- 🔗 一次ソース確認ボタンの追加 ---
        const githubBlobUrl = `https://github.com/kub1221/sky-logger-hashes/blob/main/${log.githubPath}`;
        const commitHistoryUrl = `https://github.com/kub1221/sky-logger-hashes/commits/main/${log.githubPath}`;

        const btnContainer = document.createElement("div");
        btnContainer.style.marginTop = "16px";
        btnContainer.style.display = "flex";
        btnContainer.style.gap = "10px";
        btnContainer.style.flexWrap = "wrap";

        btnContainer.innerHTML = `
          <a href="${githubBlobUrl}" target="_blank" style="text-decoration:none; font-size:11px; padding:8px 14px; background:#238636; color:white; border-radius:6px; font-weight:bold;">
            🔍 GitHubで生の記録を確認 (一次ソース)
          </a>
          <a href="${commitHistoryUrl}" target="_blank" style="text-decoration:none; font-size:11px; padding:8px 14px; background:#30363d; color:white; border-radius:6px; font-weight:bold;">
            🕒 登録日時の証跡を確認 (コミット履歴)
          </a>
        `;
        // summary-ok の div を取得してボタンを追加
        const summaryDiv = summaryEl.querySelector('.summary-ok');
        if(summaryDiv) {
            summaryDiv.appendChild(btnContainer);
        }
        // --------------------------------------

      } else {
        setSummary("error", "改ざんの可能性があります。詳細を確認してください。");
      }

    } catch (e) {
      appendStatus("❌", e.message, "status-error");
      setSummary("error", "検証中にエラーが発生しました。");
    }
  }

  document.getElementById("runBtn").onclick = runVerification;

  window.addEventListener("DOMContentLoaded", () => {
    const p = getUrlParams();
    const idParam = p.videoId || p.logId;
    if (idParam) {
      idInput.value = idParam;
      runVerification();
    }
  });
</script>

</body>
</html>
